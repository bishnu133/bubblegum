<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Widget Lab — iframe inner</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 1em; }
  button { padding: 0.5em 1em; }
  #inner-status { margin-top: 1em; color: #205020; font-weight: 600; }
</style>
</head>
<body>
  <h2>Payment frame</h2>
  <button id="pay" type="button"
          onclick="document.getElementById('inner-status').textContent='paid'">
    Pay Now
  </button>
  <p id="inner-status">unpaid</p>
</body>
</html>
