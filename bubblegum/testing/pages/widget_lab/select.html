<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Widget Lab — Native &lt;select&gt;</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 2em; max-width: 32em; }
  label { display: block; font-weight: 600; margin-bottom: 0.25em; }
  select { padding: 0.4em; min-width: 14em; }
  #result { margin-top: 1em; color: #205020; }
</style>
</head>
<body>
<h1>Native &lt;select&gt;</h1>
<p>Labeled native dropdown. The "Country" label is associated with the select via <code>for</code>/<code>id</code>.</p>

<form id="form" onsubmit="return false">
  <label for="country">Country</label>
  <select id="country" name="country">
    <option value="">-- Pick one --</option>
    <option value="US">United States</option>
    <option value="IN">India</option>
    <option value="UK">United Kingdom</option>
    <option value="SG">Singapore</option>
  </select>

  <p id="result"></p>
</form>

<script>
  const sel = document.getElementById('country');
  const out = document.getElementById('result');
  sel.addEventListener('change', () => {
    const text = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text : '';
    out.textContent = text ? ('Selected: ' + text) : '';
  });
</script>
</body>
</html>
