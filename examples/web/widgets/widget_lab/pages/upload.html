<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Widget Lab — File upload</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 2em; max-width: 32em; }
  label { display: block; font-weight: 600; margin-bottom: 0.25em; }
  input[type=file] { padding: 0.4em 0; }
  #result { margin-top: 1em; color: #205020; }
</style>
</head>
<body>
<h1>File upload</h1>
<p>Labeled native file input. The "Resume" label is associated with the input via <code>for</code>/<code>id</code>.</p>

<form id="form" onsubmit="return false">
  <label for="resume">Resume</label>
  <input type="file" id="resume" name="resume" />

  <p id="result"></p>
</form>

<script>
  const inp = document.getElementById('resume');
  const out = document.getElementById('result');
  inp.addEventListener('change', () => {
    if (inp.files && inp.files.length > 0) {
      const f = inp.files[0];
      out.textContent = 'Selected file: ' + f.name + ' (' + f.size + ' bytes)';
    } else {
      out.textContent = '';
    }
  });
</script>
</body>
</html>
