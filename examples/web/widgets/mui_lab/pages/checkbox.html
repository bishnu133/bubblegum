<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MUI Lab — Checkbox</title>
<style>
  body { font-family: Roboto, -apple-system, sans-serif; padding: 2em; max-width: 32em; }
  .MuiFormGroup-root { display: flex; flex-direction: column; gap: 0.5em; margin: 1em 0; }
  .MuiFormControlLabel-root { display: inline-flex; align-items: center; gap: 0.5em; cursor: pointer; user-select: none; }
  .MuiCheckbox-root {
    position: relative; display: inline-flex; align-items: center; justify-content: center;
    width: 1.4em; height: 1.4em; border-radius: 4px;
  }
  .MuiCheckbox-root input[type="checkbox"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; margin: 0;
  }
  .MuiSvgIcon-root {
    width: 1.25em; height: 1.25em; border: 2px solid rgba(0,0,0,0.6); border-radius: 3px;
    box-sizing: border-box; background: white; transition: background 0.15s;
    /* Decorative — real MUI lets clicks pass through to the underlying
       hidden input. Without this the checked-state Mui-checked class adds
       position:relative, which pushes the SVG above the absolutely-
       positioned input in the stacking context and traps the click. */
    pointer-events: none;
  }
  .MuiCheckbox-root.Mui-checked .MuiSvgIcon-root {
    background: #1976d2; border-color: #1976d2; position: relative;
  }
  .MuiCheckbox-root.Mui-checked .MuiSvgIcon-root::after {
    content: ""; position: absolute; left: 30%; top: 10%; width: 30%; height: 60%;
    border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg);
  }
  .MuiFormLabel-root { font-weight: 500; }
  #result { margin-top: 1.5em; padding: 0.5em; background: #f5f5f5; border-radius: 4px; min-height: 1.2em; }
</style>
</head>
<body>
<h1>MUI Checkbox</h1>
<p>Each checkbox is the MUI structure: a styled wrapper around a hidden
native <code>input[type=checkbox]</code>. Labels are wired via
<code>FormControlLabel</code> so the accessible name comes from the visible text.</p>

<fieldset class="MuiFormControl-root">
  <legend class="MuiFormLabel-root">Subscriptions</legend>
  <div class="MuiFormGroup-root">
    <label class="MuiFormControlLabel-root">
      <span class="MuiCheckbox-root" id="cb_newsletter_wrap">
        <input type="checkbox" id="cb_newsletter" aria-label="Newsletter">
        <span class="MuiSvgIcon-root" aria-hidden="true"></span>
      </span>
      <span>Newsletter</span>
    </label>
    <label class="MuiFormControlLabel-root">
      <span class="MuiCheckbox-root Mui-checked" id="cb_marketing_wrap">
        <input type="checkbox" id="cb_marketing" aria-label="Marketing emails" checked>
        <span class="MuiSvgIcon-root" aria-hidden="true"></span>
      </span>
      <span>Marketing emails</span>
    </label>
    <label class="MuiFormControlLabel-root">
      <span class="MuiCheckbox-root" id="cb_terms_wrap">
        <input type="checkbox" id="cb_terms" aria-label="Accept terms">
        <span class="MuiSvgIcon-root" aria-hidden="true"></span>
      </span>
      <span>Accept terms</span>
    </label>
  </div>
</fieldset>

<p id="result"></p>

<script>
  function bind(id) {
    const input = document.getElementById(id);
    const wrap = document.getElementById(id + '_wrap');
    input.addEventListener('change', () => {
      wrap.classList.toggle('Mui-checked', input.checked);
      document.getElementById('result').textContent =
        input.getAttribute('aria-label') + ' is ' + (input.checked ? 'checked' : 'unchecked');
    });
  }
  ['cb_newsletter', 'cb_marketing', 'cb_terms'].forEach(bind);
</script>
</body>
</html>
