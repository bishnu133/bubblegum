name: Publish

# Publishes the built distribution to (Test)PyPI using PyPI **Trusted Publishing**
# (OIDC) — no API tokens are stored as secrets. See docs/publishing.md for the
# one-time PyPI/GitHub-environment setup the maintainer must do before this runs.
#
# Triggers:
#   * workflow_dispatch (publish unchecked) -> dry-run upload to TestPyPI (manual, safe to repeat)
#   * workflow_dispatch (publish checked)   -> real upload to PyPI (one-click release from the Actions UI)
#   * push of a v* tag                      -> real upload to PyPI (e.g. `git push origin v0.0.6-alpha`)
#
# A normal merge to main never publishes — only a tag push or a manual run with
# the "publish" box checked does.

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish for real to PyPI (unchecked = dry run to TestPyPI)"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & verify distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build/check/test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install build "twine>=6.1"

      - name: Validate package (default)
        run: python scripts/validate_package.py

      - name: Validate package (strict release gate)
        run: python scripts/validate_package.py --strict

      - name: Package metadata tests
        run: pytest tests/unit/test_package_metadata.py -q

      - name: Clean build artifacts
        run: rm -rf dist build *.egg-info

      - name: Build distribution artifacts
        run: python -m build

      - name: Twine metadata/README rendering check
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  testpypi:
    name: Publish to TestPyPI (dry run)
    needs: build
    # Manual run with the "publish" box unchecked -> safe dry run to TestPyPI.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'true'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Re-running a dry run for an already-uploaded version is a no-op
          # success instead of a hard 400 ("File already exists").
          skip-existing: true

  pypi:
    name: Publish to PyPI
    needs: build
    # Real publish: a pushed v* tag, OR a manual run with "publish" checked
    # (one-click release from the Actions UI — no tag, no stale-commit risk).
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent re-runs: if this version's files are already on PyPI,
          # skip rather than fail (PyPI versions are immutable).
          skip-existing: true
