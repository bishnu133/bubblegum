name: Publish

# Publishes the built distribution to (Test)PyPI using PyPI **Trusted Publishing**
# (OIDC) — no API tokens are stored as secrets. See docs/publishing.md for the
# one-time PyPI/GitHub-environment setup the maintainer must do before this runs.
#
# Triggers:
#   * workflow_dispatch  -> dry-run upload to TestPyPI (manual, safe to repeat)
#   * push of a v* tag   -> real upload to PyPI (e.g. `git push origin v0.0.6-alpha`)
#
# A normal merge to main never publishes — only a tag push does.

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & verify distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build/check/test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install build "twine>=6.1"

      - name: Validate package (default)
        run: python scripts/validate_package.py

      - name: Validate package (strict release gate)
        run: python scripts/validate_package.py --strict

      - name: Package metadata tests
        run: pytest tests/unit/test_package_metadata.py -q

      - name: Clean build artifacts
        run: rm -rf dist build *.egg-info

      - name: Build distribution artifacts
        run: python -m build

      - name: Twine metadata/README rendering check
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  testpypi:
    name: Publish to TestPyPI (dry run)
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
