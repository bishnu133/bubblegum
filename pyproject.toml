[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "bubblegum-ai"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.0", "pyyaml"]


[project.optional-dependencies]
test = ["pytest-asyncio"]
web = ["playwright"]
mobile = ["Appium-Python-Client"]
dev = ["pytest-asyncio"]
all = ["playwright", "Appium-Python-Client", "pytest-asyncio"]


[project.entry-points.pytest11]
bubblegum = "bubblegum.pytest_plugin"

[tool.setuptools.packages.find]
where = ["."]
include = ["bubblegum*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "llm: marks tests that call the real LLM API",
    "memory: marks tests that require disk-backed memory fixtures",
    "appium: marks tests that require Appium server/device",
    "playwright: marks tests that require Playwright/browser setup",
    "e2e: marks optional end-to-end tests",
]
